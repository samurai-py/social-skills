<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="{{googleFonts}}" rel="stylesheet">
<style>
  {{baseStyles}}
  #canvas{width:1080px;height:1920px;position:relative;isolation:isolate;overflow:hidden;background:{{bg}};color:{{text}};font-family:{{display}};}
  .content-wrap {
    padding: 140px 90px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo-area {
    font-size: 28px;
    font-weight: 800;
    color: {{accent}};
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-area svg {
    height: 28px;
    width: auto;
  }
  .header-meta {
    font-family: {{mono}};
    font-size: 18px;
    color: {{muted}};
  }
  .main-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 25px;
  }
  .kicker {
    font-family: {{mono}};
    font-size: 24px;
    font-weight: 600;
    color: {{accent}};
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .title {
    font-size: 84px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -2px;
  }
  .title span {
    color: {{accent}};
  }
  .body-text {
    font-size: 32px;
    line-height: 1.6;
    color: {{muted}};
  }
  .footer {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    border-top: 1px solid {{surface}};
    padding-top: 35px;
  }
  .footer-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-handle {
    font-family: {{mono}};
    font-size: 22px;
    color: {{muted}};
  }
  .footer-cta {
    font-family: {{mono}};
    font-size: 22px;
    font-weight: 600;
    color: {{accent}};
  }
</style></head>
<body><div id="canvas">
  <div class="bg-photo" style="{{bgstyle}}"></div>
  <div class="bg-overlay"></div>
  <div class="bg-pattern {{patternClass}}"></div>
  <div class="content-wrap">
    <div class="header">
      <div class="logo-area">{{logoSvg}}{{logoText}}</div>
      <div class="header-meta">{{topright}}</div>
    </div>
    <div class="main-body">
      <div class="kicker">{{kicker}}</div>
      <div class="title">{{titulo}}</div>
      <div class="body-text">{{corpo}}</div>
    </div>
    <div class="footer">
      <div class="footer-row">
        <div class="footer-handle">{{handle}}</div>
        <div class="footer-cta">{{cta}}</div>
      </div>
    </div>
  </div>
</div></body></html>
