<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="{{googleFonts}}" rel="stylesheet">
<style>
  {{baseStyles}}
  /* Generic layout — showcases the procedural pattern system ({{patternClass}}) as the
     background, no photo needed. Code-only (not block-editable): see story.html for the
     bgimage-driven counterpart, blog-cover.html for the icon-forward one. */
  #canvas{width:1080px;height:1080px;position:relative;isolation:isolate;overflow:hidden;background:{{bg}};color:{{text}};font-family:{{display}};padding:80px;display:flex;flex-direction:column;justify-content:space-between;}
  .lockup{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
  .lockup .mark{display:flex;align-items:center;gap:14px;}
  .lockup .mark .ic{width:40px;height:40px;color:{{text}};}
  .lockup .mark span{font-family:{{mono}};font-size:24px;letter-spacing:1px;color:{{muted}};}
  .lockup .handle{font-family:{{mono}};font-size:22px;color:{{muted}};}
  .mid{position:relative;z-index:1;}
  .kicker{display:inline-flex;align-items:center;gap:10px;font-family:{{mono}};font-size:24px;font-weight:600;color:{{accent}};text-transform:uppercase;letter-spacing:4px;padding-bottom:22px;}
  .kicker::before{content:"";width:34px;height:9px;border-radius:5px;background:{{accent}};}
  .title{font-weight:700;font-size:92px;line-height:1.04;letter-spacing:-2px;color:{{text}};max-width:920px;}
  .foot{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
  .cta{font-family:{{mono}};font-size:28px;font-weight:600;color:{{accent}};}
</style></head>
<body>
  <div id="canvas">
    <div class="bg-photo" style="{{bgstyle}}"></div>
    <div class="bg-overlay"></div>
    <div class="bg-pattern {{patternClass}}"></div>
    <div class="lockup">
      <div class="mark"><span class="ic">{{logoSvg}}</span><span>{{logoText}}</span></div>
      <div class="handle">{{handle}}</div>
    </div>
    <div class="mid">
      <div class="kicker">{{kicker}}</div>
      <div class="title">{{titulo}}</div>
    </div>
    <div class="foot">
      <span class="cta">{{cta}}</span>
      <span class="ic" style="width:44px;height:44px;color:{{accent}}">{{icon:sparkles}}</span>
    </div>
  </div>
</body></html>
